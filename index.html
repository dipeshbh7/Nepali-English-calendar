<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nepali to English Date Converter</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-400-normal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-600-normal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-700-normal.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📅 Date Converter</h1>
      <p>Nepali (Bikram Sambat) → English (Gregorian)</p>
    </div>
    <div class="accent-bar"></div>

    <div class="content">
      <div class="input-group">
        <label>Nepali Date (BS)</label>
        <div class="input-row">
          <div class="input-field">
            <select id="bsYear"></select>
          </div>
          <div class="input-field">
            <select id="bsMonth"></select>
          </div>
          <div class="input-field">
            <select id="bsDay"></select>
          </div>
        </div>
      </div>

      <button class="btn-convert" id="convertBtn">Convert to English</button>

      <div class="result" id="result">
        <div class="result-label" id="resultLabel">English Date</div>
        <div class="result-value" id="resultValue">—</div>
        <div class="result-day" id="resultDay"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
